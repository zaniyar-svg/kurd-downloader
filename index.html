<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سناپ کورد - داونلۆدکەر</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        input { padding: 15px; width: 90%; border-radius: 10px; border: none; margin-bottom: 15px; }
        button { padding: 15px 30px; background: #ff0050; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SnapKurd Downloader</h1>
    <input type="text" id="url" placeholder="لینکێ ڤیدیۆیێ ل ڤێرێ دابنێ...">
    <br>
    <button onclick="window.open('https://snapsave.app/?url=' + document.getElementById('url').value, '_blank')">دەستپێکرنا داونلۆدێ</button>
</body>
</html>
