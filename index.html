<!DOCTYPE html>
<html lang="kmr" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">داونلۆدەرێ ڤیدیۆیان - بێ وەتەرمارک</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- [Header Section Remains Same] -->
    <header class="p-4 bg-opacity-30 bg-black backdrop-blur-md border-b border-gray-800">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-cyan-400 tracking-wide">Snap<span class="text-white">Kurd</span></h1>
            <div class="flex items-center gap-2 bg-gray-900/80 px-3 py-1.5 rounded-xl border border-gray-700">
                <span class="text-sm">🌐</span>
                <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-transparent text-sm text-gray-200 focus:outline-none cursor-pointer">
                    <option value="bhd">کوردی (بەهدینی)</option>
                    <option value="sor">کوردی (سۆرانی)</option>
                    <option value="ara">العربية</option>
                    <option value="en_us">English (US)</option>
                    <option value="en_uk">English (UK)</option>
                </select>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
        <div class="w-full max-w-2xl text-center space-y-8">
            <div class="space-y-3">
                <h2 id="mainHeading" class="text-3xl md:text-5xl font-extrabold tracking-tight text-white">
                    داونلۆدکرنا ڤیدیۆیێن <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">سۆشیال میدیایێ</span>
                </h2>
                <p id="mainDesc" class="text-gray-400 text-base md:text-lg">لینکێ ڤیدیۆیێ دەنێ و ب بەرزترین کوالێتی و بێ وەتەرمارک داونلۆد بکە.</p>
            </div>

            <div class="bg-gray-900/60 p-6 rounded-2xl border border-gray-800 shadow-2xl backdrop-blur-md">
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="videoUrl" placeholder="لینکێ ڤیدیۆیا TikTok, Instagram یان Shorts ل ڤێرێ دابنێ..." 
                        class="flex-grow px-5 py-4 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition text-right">
                    <button onclick="downloadVideo()" id="btnText" class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 font-bold rounded-xl shadow-lg shadow-cyan-500/20 transition duration-300 text-white whitespace-nowrap cursor-pointer">
                        دەرخستنا ڤیدیۆیێ
                    </button>
                </div>

                <div id="loading" class="hidden mt-6 text-cyan-400 font-medium animate-pulse">
                    ⏳ چاوەڕێبە... ڤیدیۆ دهێتە ئامادەکرن...
                </div>

                <div id="result" class="hidden mt-6 p-4 bg-gray-800/80 rounded-xl border border-gray-700 space-y-4">
                    <p id="successMsg" class="text-green-400 font-semibold">✨ ڤیدیۆ ب سەرکەفتن هاتە دۆزینەوە!</p>
                    <div class="flex justify-center">
                        <a id="downloadBtn" href="#" target="_blank" download class="px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-md transition duration-200">
                            📥 ئێستا داونلۆد بکە
                        </a>
                    </div>
                </div>
            </div>
            <!-- [Footer & Grid Section remains same] -->
        </div>
    </main>

    <script>
        // [Language Translation logic remains same]
        // ... (keep your existing translations object here) ...

        async function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!urlInput) {
                alert('Please enter a valid link!');
                return;
            }

            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // دڤێت تو API یا Cobalt بکاربینی چونکی ئەڤە یا ستانداردە بۆ داونلۆدکرنێ
                const response = await fetch(`https://api.cobalt.tools/api/json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();
                
                if (data.status === 'picker' || data.status === 'tunnel' || data.url) {
                    loading.classList.add('hidden');
                    resultDiv.classList.remove('hidden');
                    downloadBtn.href = data.url || data.picker[0].url;
                } else {
                    throw new Error('Could not fetch video');
                }
            } catch (error) {
                loading.classList.add('hidden');
                alert('Error: Please try a different link or check your connection.');
            }
        }
    </script>
</body>
</html>
