<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داونلۆدکرنا ڤیدیۆیان</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #0f172a; color: white; }
        input { padding: 10px; width: 80%; max-width: 400px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #06b6d4; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>داونلۆدکرنا ڤیدیۆیان</h1>
    <input type="text" id="url" placeholder="لینکێ ڤیدیۆیێ ل ڤێرێ دابنێ...">
    <button onclick="download()">دەستپێکرنا داونلۆدێ</button>

    <script>
        async function download() {
            const url = document.getElementById('url').value;
            if(!url) return alert('تکایە لینکەکێ دابنێ');
            
            // ئەڤە تەنێ نموونەیە، دڤێت API یا تە یا دروست بیت
            alert('داونلۆد دێ دەست پێ کەت...');
        }
    </script>
</body>
</html>
